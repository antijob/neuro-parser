# Made in a reusable way
# Ref: https://docs.github.com/en/actions/sharing-automations/reusing-workflows
name: Verify

on:
  pull_request:
  push:
    branches:
      - stage
      - main
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Run verify
    runs-on: ["self-hosted", "neuroparser", "staging"]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install pdm
        run: python -m pip install --upgrade pip pdm

      - name: Prepare .env
        run: cp .env.template .env

      - name: Install dependencies
        env:
          PDM_IGNORE_SAVED_PYTHON: "1"
        run: pdm install --dev --frozen-lockfile -v

      - name: Run verify
        run: bash scripts/verify.sh
