# Made in a reusable way
# Ref: https://docs.github.com/en/actions/sharing-automations/reusing-workflows
name: Verify

on:
  pull_request:
  push:
    branches:
      - stage
      - main
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Run verify
    runs-on: ["self-hosted", "neuroparser", "staging"]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install pdm
        run: python -m pip install --upgrade pip pdm

      - name: Cache PDM dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pdm
            .venv
          key: ${{ runner.os }}-pdm-${{ hashFiles('pdm.lock') }}
          restore-keys: |
            ${{ runner.os }}-pdm-

      - name: Prepare .env
        run: cp .env.template .env

      - name: Check disk space before install
        run: |
          echo "=== Disk space ===" && df -h / && echo "" && echo "=== Available memory ===" && free -h

      - name: Install dependencies
        env:
          PDM_IGNORE_SAVED_PYTHON: "1"
        run: |
          timeout 600 pdm install --dev --frozen-lockfile -v --no-self || {
            echo "=== Disk space after timeout ===" && df -h /
            exit 1
          }

      - name: Run verify
        run: bash scripts/verify.sh
